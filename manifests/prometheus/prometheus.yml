apiVersion: v1
kind: Namespace
metadata:
  name: __PROMETHEUS_NAMESPACE__
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: __PROMETHEUS_NAMESPACE__
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: runtimeclass-bench-prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
    verbs: ["get", "list", "watch"]
  - nonResourceURLs:
      - /metrics
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: runtimeclass-bench-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: runtimeclass-bench-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: __PROMETHEUS_NAMESPACE__
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: __PROMETHEUS_NAMESPACE__
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: kubelet
        scheme: https
        metrics_path: /metrics
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - source_labels: [__meta_kubernetes_node_address_InternalIP]
            target_label: __address__
            replacement: ${1}:10250
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
        metric_relabel_configs:
          - source_labels: [__name__]
            action: keep
            regex: (kubelet_run_podsandbox_duration_seconds|kubelet_pod_start_sli_duration_seconds|kubelet_pod_start_total_duration_seconds)(_bucket|_sum|_count)?
      - job_name: kubelet-cadvisor
        scheme: https
        metrics_path: /metrics/cadvisor
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - source_labels: [__meta_kubernetes_node_address_InternalIP]
            target_label: __address__
            replacement: ${1}:10250
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
        metric_relabel_configs:
          - source_labels: [__name__]
            action: keep
            regex: machine_info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: __PROMETHEUS_NAMESPACE__
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: runtimeclass-bench
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/part-of: runtimeclass-bench
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: runtimeclass-bench
    spec:
      serviceAccountName: prometheus
      nodeSelector:
        __PROMETHEUS_SYSTEM_NODE_SELECTOR_KEY__: __PROMETHEUS_SYSTEM_NODE_SELECTOR_VALUE__
      containers:
        - name: prometheus
          image: mcr.microsoft.com/oss/v2/prometheus/prometheus:v3.11.3
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=6h
            - --web.listen-address=:9090
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: __PROMETHEUS_SERVICE_NAME__
  namespace: __PROMETHEUS_NAMESPACE__
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: runtimeclass-bench
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: runtimeclass-bench
  ports:
    - name: http
      port: 9090
      targetPort: http
