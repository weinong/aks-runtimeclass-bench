apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
---
apiVersion: v1
kind: Namespace
metadata:
  name: runtimeclass-gvisor
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gvisor-installer
  namespace: runtimeclass-gvisor
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gvisor-installer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gvisor-installer
    spec:
      hostPID: true
      nodeSelector:
        kubernetes.azure.com/agentpool: __GVISOR_NODEPOOL_NAME__
      tolerations:
        - operator: Exists
      restartPolicy: Always
      containers:
        - name: installer
          image: ubuntu:22.04
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -ceu
            - |
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl
              curl -fsSL -o /host/usr/local/bin/runsc https://storage.googleapis.com/gvisor/releases/release/latest/x86_64/runsc
              curl -fsSL -o /host/usr/local/bin/containerd-shim-runsc-v1 https://storage.googleapis.com/gvisor/releases/release/latest/x86_64/containerd-shim-runsc-v1
              chmod 0755 /host/usr/local/bin/runsc /host/usr/local/bin/containerd-shim-runsc-v1
              nsenter --target 1 --mount --uts --ipc --net --pid -- bash -ceu '
                mkdir -p /etc/containerd/conf.d
                printf "%s\n" \
                  "[plugins.\"io.containerd.grpc.v1.cri\".containerd.runtimes.runsc]" \
                  "  runtime_type = \"io.containerd.runsc.v1\"" \
                  >/etc/containerd/conf.d/99-runsc.toml
              '
              nsenter --target 1 --mount --uts --ipc --net --pid -- systemctl restart containerd
              sleep infinity
          volumeMounts:
            - name: host-root
              mountPath: /host
      volumes:
        - name: host-root
          hostPath:
            path: /
---
apiVersion: v1
kind: Pod
metadata:
  name: gvisor-smoke
  namespace: runtimeclass-gvisor
  labels:
    app.kubernetes.io/name: gvisor-smoke
spec:
  runtimeClassName: gvisor
  nodeSelector:
    kubernetes.azure.com/agentpool: __GVISOR_NODEPOOL_NAME__
  tolerations:
    - operator: Exists
  restartPolicy: Never
  containers:
    - name: smoke
      image: python:3.12-slim
      command: ["python3", "-c", "print('gvisor smoke')"]
