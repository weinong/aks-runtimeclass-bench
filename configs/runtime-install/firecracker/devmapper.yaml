apiVersion: v1
kind: Namespace
metadata:
  name: runtimeclass-firecracker
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: firecracker-devmapper-installer
  namespace: runtimeclass-firecracker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: firecracker-devmapper-installer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firecracker-devmapper-installer
    spec:
      hostPID: true
      nodeSelector:
        kubernetes.azure.com/agentpool: __FIRECRACKER_NODEPOOL_NAME__
      tolerations:
        - operator: Exists
      restartPolicy: Always
      containers:
        - name: installer
          image: mcr.microsoft.com/azurelinux/busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -ceu
            - |
              chroot /host /usr/bin/nsenter --target 1 --mount --uts --ipc --net --pid -- sh -ceu '
                command -v dmsetup >/dev/null 2>&1 || { echo "dmsetup is required to configure the devmapper thin pool" >&2; exit 1; }
                mkdir -p /var/lib/containerd/devmapper
                truncate -s 100G /var/lib/containerd/devmapper/data
                truncate -s 2G /var/lib/containerd/devmapper/meta
                data_loop=$(losetup -j /var/lib/containerd/devmapper/data | cut -d: -f1 | head -n1)
                meta_loop=$(losetup -j /var/lib/containerd/devmapper/meta | cut -d: -f1 | head -n1)
                if [ -z "$data_loop" ]; then
                  data_loop=$(losetup --find --show /var/lib/containerd/devmapper/data)
                fi
                if [ -z "$meta_loop" ]; then
                  meta_loop=$(losetup --find --show /var/lib/containerd/devmapper/meta)
                fi
                if ! dmsetup info containerd-pool >/dev/null 2>&1; then
                  low_water_mark=32768
                  block_size=128
                  data_blocks=$(blockdev --getsz "$data_loop")
                  dmsetup create containerd-pool --table "0 $data_blocks thin-pool $meta_loop $data_loop $block_size $low_water_mark"
                fi
                mkdir -p /etc/containerd/conf.d
                printf "%s\n" \
                  "[plugins.\"io.containerd.snapshotter.v1.devmapper\"]" \
                  "  root_path = \"/var/lib/containerd/devmapper\"" \
                  "  pool_name = \"containerd-pool\"" \
                  "  base_image_size = \"10GB\"" \
                  >/etc/containerd/conf.d/99-devmapper.toml
                systemctl restart containerd
              '
              sleep infinity
