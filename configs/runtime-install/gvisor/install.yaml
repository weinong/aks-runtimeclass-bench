apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
---
apiVersion: v1
kind: Namespace
metadata:
  name: runtimeclass-gvisor
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gvisor-installer
  namespace: runtimeclass-gvisor
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gvisor-installer
    spec:
      hostPID: true
      nodeSelector:
        kubernetes.azure.com/agentpool: __GVISOR_NODEPOOL_NAME__
      tolerations:
        - operator: Exists
      restartPolicy: OnFailure
      containers:
        - name: installer
          image: mcr.microsoft.com/azurelinux/busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -ceu
            - |
              chroot /host /usr/bin/nsenter --target 1 --mount --uts --ipc --net --pid -- sh -seu <<'HOST_SCRIPT'
                marker=/var/lib/runtimeclass-bench/gvisor-installed
                runsc_path=/usr/local/bin/runsc
                shim_path=/usr/local/bin/containerd-shim-runsc-v1
                conf_path=/etc/containerd/conf.d/99-runsc.toml
                if [ -f "$marker" ] && [ -x "$runsc_path" ] && [ -x "$shim_path" ] && [ -f "$conf_path" ]; then
                  exit 0
                fi
                command -v curl >/dev/null 2>&1 || { echo "curl is required to install gVisor binaries" >&2; exit 1; }
                curl -fsSL -o "${runsc_path}.tmp" https://storage.googleapis.com/gvisor/releases/release/latest/x86_64/runsc
                curl -fsSL -o "${shim_path}.tmp" https://storage.googleapis.com/gvisor/releases/release/latest/x86_64/containerd-shim-runsc-v1
                chmod 0755 "${runsc_path}.tmp" "${shim_path}.tmp"
                mv "${runsc_path}.tmp" "$runsc_path"
                mv "${shim_path}.tmp" "$shim_path"
                mkdir -p /etc/containerd/conf.d
                import_path='"/etc/containerd/conf.d/*.toml"'
                if ! grep -Fq "$import_path" /etc/containerd/config.toml; then
                  tmp="/etc/containerd/config.toml.tmp"
                  awk -v import_path="$import_path" '
                    /^imports[[:space:]]*=/ {
                      sub(/\[/, "[" import_path ", ");
                      inserted=1;
                    }
                    /^version[[:space:]]*=/ { version_line=NR }
                    /^\[/ && !first_table { first_table=NR }
                    { line=$0; lines[NR]=line }
                    END {
                      insert_after = version_line ? version_line : first_table - 1;
                      for (i = 1; i <= NR; i++) {
                        print lines[i];
                        if (!inserted && i == insert_after) {
                          print "imports = [" import_path "]";
                        }
                      }
                      if (!inserted && !insert_after) {
                        print "imports = [" import_path "]";
                      }
                    }
                  ' /etc/containerd/config.toml > "$tmp"
                  mv "$tmp" /etc/containerd/config.toml
                fi
                printf "%s\n" \
                  "[plugins.\"io.containerd.cri.v1.runtime\".containerd.runtimes.runsc]" \
                  "  runtime_type = \"io.containerd.runsc.v1\"" \
                  >"$conf_path"
                mkdir -p "$(dirname "$marker")"
                systemctl daemon-reload
                systemctl restart containerd
                touch "$marker"
              HOST_SCRIPT
          volumeMounts:
            - name: host-root
              mountPath: /host
      volumes:
        - name: host-root
          hostPath:
            path: /
