apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
---
apiVersion: v1
kind: Namespace
metadata:
  name: runtimeclass-gvisor
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gvisor-installer
  namespace: runtimeclass-gvisor
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gvisor-installer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gvisor-installer
    spec:
      hostPID: true
      nodeSelector:
        kubernetes.azure.com/agentpool: __GVISOR_NODEPOOL_NAME__
      tolerations:
        - operator: Exists
      restartPolicy: Always
      containers:
        - name: installer
          image: mcr.microsoft.com/azurelinux/busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -ceu
            - |
              chroot /host /usr/bin/nsenter --target 1 --mount --uts --ipc --net --pid -- sh -seu <<'HOST_SCRIPT'
                command -v curl >/dev/null 2>&1 || { echo "curl is required to install gVisor binaries" >&2; exit 1; }
                curl -fsSL -o /usr/local/bin/runsc https://storage.googleapis.com/gvisor/releases/release/latest/x86_64/runsc
                curl -fsSL -o /usr/local/bin/containerd-shim-runsc-v1 https://storage.googleapis.com/gvisor/releases/release/latest/x86_64/containerd-shim-runsc-v1
                chmod 0755 /usr/local/bin/runsc /usr/local/bin/containerd-shim-runsc-v1
                mkdir -p /etc/containerd/conf.d
                import_path='"/etc/containerd/conf.d/*.toml"'
                if ! grep -Fq "$import_path" /etc/containerd/config.toml; then
                  tmp="/etc/containerd/config.toml.tmp"
                  awk -v import_path="$import_path" '
                    /^imports[[:space:]]*=/ {
                      sub(/\[/, "[" import_path ", ");
                      inserted=1;
                    }
                    /^version[[:space:]]*=/ { version_line=NR }
                    /^\[/ && !first_table { first_table=NR }
                    { line=$0; lines[NR]=line }
                    END {
                      insert_after = version_line ? version_line : first_table - 1;
                      for (i = 1; i <= NR; i++) {
                        print lines[i];
                        if (!inserted && i == insert_after) {
                          print "imports = [" import_path "]";
                        }
                      }
                      if (!inserted && !insert_after) {
                        print "imports = [" import_path "]";
                      }
                    }
                  ' /etc/containerd/config.toml > "$tmp"
                  mv "$tmp" /etc/containerd/config.toml
                fi
                printf "%s\n" \
                  "[plugins.\"io.containerd.cri.v1.runtime\".containerd.runtimes.runsc]" \
                  "  runtime_type = \"io.containerd.runsc.v1\"" \
                  >/etc/containerd/conf.d/99-runsc.toml
                systemctl restart containerd
              HOST_SCRIPT
              sleep infinity
          volumeMounts:
            - name: host-root
              mountPath: /host
      volumes:
        - name: host-root
          hostPath:
            path: /
---
apiVersion: v1
kind: Pod
metadata:
  name: gvisor-smoke
  namespace: runtimeclass-gvisor
  labels:
    app.kubernetes.io/name: gvisor-smoke
spec:
  runtimeClassName: gvisor
  nodeSelector:
    kubernetes.azure.com/agentpool: __GVISOR_NODEPOOL_NAME__
  tolerations:
    - operator: Exists
  restartPolicy: Never
  containers:
    - name: smoke
      image: mcr.microsoft.com/azurelinux/base/python:3
      command: ["python3", "-c", "print('gvisor smoke')"]
